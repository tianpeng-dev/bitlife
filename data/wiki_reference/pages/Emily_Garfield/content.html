<div class="mw-content-ltr mw-parser-output" lang="en" dir="ltr"><p><b>Emily Garfield</b> (1930 - 2018) was an American wedding planner and the single mother of professional baseball player <a href="/wiki/Perry_Garfield" title="Perry Garfield">Perry Garfield</a>. 
</p>
<h2><span class="mw-headline" id="Death">Death</span><span class="mw-editsection"><span class="mw-editsection-bracket">[</span><a title="Sign in to edit" class="mw-editsection-visualeditor" data-tracking-label="log-in-edit-section" data-action="edit-section" href="https://auth.fandom.com/signin?redirect=https%3A%2F%2Fbitlife-life-simulator.fandom.com%2Fwiki%2FEmily_Garfield%3Fveaction%3Dedit%26section%3D1&amp;uselang=en&amp;metadata=article-registration-edit-article-section" data-testid="log-in-edit-section" aria-label="Sign in to edit"><svg class="wds-icon wds-icon-tiny" aria-hidden="true" focusable="false"><use xlink:href="#wds-icons-pencil-tiny"></use></svg></a><span class="mw-editsection-bracket">]</span></span></h2>

</p>
